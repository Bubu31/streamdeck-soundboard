<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Volume Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: #9b9b9b;
      background-color: #2d2d2d;
      margin: 0;
      padding: 10px;
    }
    .sdpi-wrapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info {
      background-color: #3b3b3b;
      border-radius: 4px;
      padding: 10px;
      color: #d8d8d8;
    }
    .info h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
    }
    .info p {
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="info">
      <h3>Volume Control</h3>
      <p>
        <strong>Click/Push:</strong> Toggle mute<br>
        <strong>Rotate (Encoder):</strong> Adjust volume
      </p>
    </div>
  </div>

  <script>
    function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
      const websocket = new WebSocket(`ws://127.0.0.1:${inPort}`);

      websocket.onopen = function() {
        websocket.send(JSON.stringify({
          event: inRegisterEvent,
          uuid: inPluginUUID
        }));
      };
    }
  </script>
</body>
</html>
